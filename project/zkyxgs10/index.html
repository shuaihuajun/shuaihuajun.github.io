<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>突发奇想 | 作品集 - 陈帅华的官方网站</title>
  <style media="screen">
    * {
      margin: 0;
      padding: 0;
    }

    htmlk,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <canvas id="canvas" width="300" height="300"></canvas>
  <script type="text/javascript" src="./three.js"></script>
  <script type="text/javascript">
    var scene = new THREE.Scene();
    scene.background = new THREE.Color('hsl(180, 10%, 10%, 1)');
    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.__angle = 0;
    camera.__dis = 100;
    camera.__lookAtCenter = new THREE.Vector3(0, 0, 0);
    camera.position.y = 20;
    var renderer = new THREE.WebGLRenderer({
      canvas: document.querySelector('#canvas'),
      antialias: true,
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enable = true;

    var earth;
    function init() {
      var earthMat = new THREE.MeshBasicMaterial({
        color: 0x000000,
      });
      var earthGeo = new THREE.SphereGeometry(27, 15, 15);
      earth = new THREE.Mesh(earthGeo, earthMat);
      earth.__rotation = 0;
      earth.rotation.x = Math.PI / 180 * 20;
      scene.add(earth);

      var spotLight = new THREE.SpotLight(0xffffff, 3);
      spotLight.position.set(20, 0, 50);
      spotLight.angle = Math.PI / 180 * 40;
      spotLight.penumbra = 0.2;
      scene.add(spotLight);

      var spotLightHelper = new THREE.SpotLightHelper(spotLight);
      scene.add(spotLightHelper);

      var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);


      var loader = new THREE.TextureLoader();
      loader.load(
        './earth.png',
        function (texture) {
          var earthMat = new THREE.MeshLambertMaterial({
            map: texture
          });
          earth.material = earthMat;
        }
      );
      // var earthHelper = new THREE.FaceNormalsHelper(earth, 3, 0xffff00, 1);
      // scene.add(earthHelper);

      var normalMatrix = new THREE.Matrix3();
      var matrixWorld = earth.matrixWorld;
      normalMatrix.getNormalMatrix(earth.matrixWorld);
      var earthFaces = earth.geometry.faces;
      var earthVertices = earth.geometry.vertices;
      for (var i = 0; i < earthFaces.length; i++) {
        var _cube = new THREE.Mesh(new THREE.SphereGeometry(1, 2, 2), new THREE.MeshBasicMaterial({ wireframe: true }));
        _cube.name = 'sphere_' + i;
        var v1 = new THREE.Vector3();
        v1.copy(earthVertices[earthFaces[i].a])
          .add(earthVertices[earthFaces[i].b])
          .add(earthVertices[earthFaces[i].c])
          .multiplyScalar(0.5)
          .applyMatrix4(matrixWorld);
        _cube.position.set(v1.x, v1.y, v1.z);
        scene.add(_cube);
      }

      for (var i = 0; i < scene.children.length; i++) {
        if (!scene.getObjectByName('sphere_' + i) || !scene.getObjectByName('sphere_' + (i + 1))) { continue; }
        var sphere = scene.getObjectByName('sphere_' + i);
        var matrixWorld = sphere.matrixWorld;
        var start = sphere.position;
        var end = scene.getObjectByName('sphere_' + (i + 1)).position;
        var middle = new THREE.Vector3();
        middle.copy(start)
          .add(end)
          .applyMatrix4(matrixWorld)
          .multiplyScalar(0.9);

        var curve = new THREE.CatmullRomCurve3([
          start,
          middle,
          end
        ]);
        var startLinGeo = new THREE.Geometry();
        startLinGeo.vertices = curve.getPoints(16);
        var lineMat = new THREE.LineBasicMaterial({ color: 0xfffffff });
        var line = new THREE.Line(startLinGeo, lineMat);
        scene.add(line);
      }



    }

    function render() {
      requestAnimationFrame(render);
      renderer.render(scene, camera);

      earth.__rotation += Math.PI / 180 * 0.5;
      earth.rotation.y = earth.__rotation;

      camera.__angle += Math.PI / 180 * 0.5;
      camera.position.x = Math.cos(camera.__angle) * camera.__dis;
      camera.position.z = Math.sin(camera.__angle) * camera.__dis;
      camera.lookAt(camera.__lookAtCenter);
    };

    init();
    render();

    window.addEventListener('resize', function () {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.render(scene, camera);
    }, false);
  </script>
</body>

</html>
