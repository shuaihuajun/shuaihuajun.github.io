    var universal;

      emitClickPlanet: function (planets, planet) {

      }
    });
    for (var i = 0, l = planetData.length; i < l; i++) {
      universal.addPlanet(planetData[i]);
    }
    universal.render();

    function showPop(planet) {
      var _w = document.querySelector('#popWrap');
      _w ? _w.remove() : null;

      _w = document.createElement('div');
      _w.setAttribute('class', 'pop-wrap');
      _w.style.cssText = '';
      document.body.appendChild(_w);

      _content = document.createElement('div');
      _content.setAttribute('class', 'pop-content');
      _w.appendChild(_content);

      _close = document.createElement('div');
      _close.setAttribute('class', 'close');
      _close.addEventListener('click', function () {
        console.log(_w);
        _w.remove();
      }, false);
      _content.appendChild(_close);

      _title = document.createElement('div');
      _title.setAttribute('class', 'title');
