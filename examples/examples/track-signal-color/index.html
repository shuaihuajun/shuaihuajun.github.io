<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>显示轨道（红白）信号颜色</title>
    <link rel="stylesheet" href="../lib/airglass/rsm-1.0.0.css" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }
      svg {
        display: block;
      }
      #app {
        height: 100%;
        background-color: #222;
      }
      #loading {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        color: #fff;
        font-weight: bold;
        font-size: 20px;
        letter-spacing: 0.2em;
        background-color: hsla(0, 0%, 0%, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      #loading-count {
        font-size: 5em;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div>
        <div id="loading-count">0%</div>
        <div>正在加载轨道信号模拟数据...</div>
      </div>
    </div>
    <script src="../lib/d3.v7.min.js"></script>
    <script src="../lib/airglass/rsm-1.0.0.js"></script>
    <script>
      fetch("../static/安国站.svg")
        .then((res) => res.text())
        .then(async (svgstr) => {
          const station = rsm.initStationFromSVG(
            svgstr,
            document.querySelector("#app")
          );

          station.layers
            .get("station_original_map")
            .style("opacity", 0.85)
            .style("filter", "grayscale(1)");

          const urlCount = 95;
          const allSignalsData = [];
          const mwbData = await fetchData("../static/mwb_data.json");
          let currentIndex = 0;

          station.codeTable.set(mwbData);

          for (let num = 0; num < urlCount + 1; num++) {
            const signalData = await fetchData(`./data/${num}.json`);
            updateLoading(Math.round((num / urlCount) * 100));
            allSignalsData.push(signalData);
          }

          setInterval(async function() {
            const signalData = allSignalsData[currentIndex];

            station.redrawTrackSignalColor(station.codeTable.parse(signalData));

            currentIndex++;
            if (currentIndex > urlCount) {
              currentIndex = 0;
            }
          }, 200);

          setTimeout(() => {
            const loadingEl = document.querySelector("#loading");
            loadingEl.parentNode.removeChild(loadingEl);
          }, 1000);
        });

      function updateLoading(num) {
        document.querySelector("#loading-count").innerText = `${num}%`;
      }

      function fetchData(url) {
        return new Promise((resolve) => {
          fetch(url)
            .then((res) => res.json())
            .then((json) => {
              setTimeout(() => {
                resolve(json);
              }, Math.round(Math.random() * 10));
            });
        });
      }
    </script>
  </body>
</html>
