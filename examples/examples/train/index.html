<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>机头设备位置</title>
    <link rel="stylesheet" href="../lib/airglass/rsm-1.0.0.css" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }
      svg {
        display: block;
      }
      #app {
        height: 100%;
        background-color: #333;
      }
      #loading {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        color: #fff;
        font-weight: bold;
        font-size: 20px;
        letter-spacing: 0.2em;
        background-color: hsla(0, 0%, 0%, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      #loading-count {
        font-size: 5em;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="../lib/d3.v7.min.js"></script>
    <script src="../lib/airglass/rsm-1.0.0.js"></script>
    <script>
      fetch("../static/安国站.svg")
        .then((res) => res.text())
        .then(async (svgstr) => {
          const station = rsm.initStationFromSVG(
            svgstr,
            document.querySelector("#app")
          );

          const locomotives = station.layers.get("locomotives");

          locomotives.append("image").attr("xlink:href", "./train.svg");

          locomotives
        });

      function fetchData(url) {
        return new Promise((resolve) => {
          fetch(url)
            .then((res) => res.json())
            .then((json) => {
              setTimeout(() => {
                resolve(json);
              }, Math.round(Math.random() * 300));
            });
        });
      }
    </script>
  </body>
</html>
