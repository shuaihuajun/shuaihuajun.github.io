<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>显示危险区域</title>
    <link rel="stylesheet" href="../lib/airglass/rsm-1.0.0.css" />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
      }
      svg {
        display: block;
      }
      #app {
        height: 100%;
        background-color: #333;
      }
      #loading {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        color: #fff;
        font-weight: bold;
        font-size: 20px;
        letter-spacing: 0.2em;
        background-color: hsla(0, 0%, 0%, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      #loading-count {
        font-size: 5em;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div>
        <div id="loading-count">0%</div>
        <div>正在加载危险区域模拟数据...</div>
      </div>
    </div>
    <script src="../lib/d3.v7.min.js"></script>
    <script src="../lib/airglass/rsm-1.0.0.js"></script>
    <script>
      fetch("../static/安国站.svg")
        .then((res) => res.text())
        .then(async (svgstr) => {
          const station = rsm.initStationFromSVG(
            svgstr,
            document.querySelector("#app")
          );

          const urlCount = 6;
          const allData = [];
          let currentIndex = 0;

          for (let num = 1; num < urlCount + 1; num++) {
            const data = await fetchData(`./data/${num}.json`);
            updateLoading(Math.round((num / urlCount) * 100));
            allData.push(data);
          }

          /**
           * 当前使用的是危险区域模拟数据地址数据的索引值
           * 从 0 开始
           */
          let currentDangerousUrlIndex = 0;

          /**
           * 模拟定时更新危险区域
           */
          setInterval(async () => {
            /**
             * 重绘危险区域
             */
            station.redrawDangerousZone(allData[currentDangerousUrlIndex]);

            /**
             * 索引值 + 1
             */
            currentDangerousUrlIndex++;

            /**
             * 索引值不应等于或大于数组的长度
             * 将索引值重置为 0
             */
            if (currentDangerousUrlIndex > allData.length - 1) {
              currentDangerousUrlIndex = 0;
            }
          }, 500);

          setTimeout(() => {
            const loadingEl = document.querySelector("#loading");
            loadingEl.parentNode.removeChild(loadingEl);
          }, 1000);
        });

      function updateLoading(num) {
        document.querySelector("#loading-count").innerText = `${num}%`;
      }

      function fetchData(url) {
        return new Promise((resolve) => {
          fetch(url)
            .then((res) => res.json())
            .then((json) => {
              setTimeout(() => {
                resolve(json);
              }, Math.round(Math.random() * 300));
            });
        });
      }

      /**
       * 重新在站场图绘制危险区域
       * @param $layer - 组容器
       * @param data - 站场图数据
       */
      function redrawDangerousZone($layer, data) {
        /**
         * 清空画布
         */
        $dangerous_zone_layer.selectAll("polygon").remove();

        /**
         * 将每一块危险区域的数据转换成一个个 polygon 元素
         */
        const $polygon = $layer
          .selectAll("polygon")
          .data(data)
          .enter()
          .append("polygon")
          .attr("points", function(d) {
            return d.map((point) => `${point.x},${point.y}`).join(" ");
          })
          .attr("stroke", "yellow")
          .attr("stroke-width", "3")
          .attr("stroke-dasharray", "15,15")
          .attr("stroke-linecap", "round")
          .attr("stroke-linejoin", "round");
      }

      /**
       * 初始化站场图：从字符串加载底图并使其可缩放
       * @param {string} svgstr - svg 字符串
       * @return svg - D3 包裹后的 SVG 元素
       */
      function initStationZoom(svgstr) {
        d3.select("#app").html(svgstr);

        const $svg = d3.select("svg");

        $svg.attr("viewBox", [0, 0, $svg.attr("width"), $svg.attr("height")]);
        $svg.style("width", "100%").style("height", "100%");

        /**
         * 确定最外部组容器，并赋予 id = 'station_canvas'
         */
        const $topGroup = $svg.append("g").attr("id", "__group__canvas");

        /**
         * 确定存放原始站场图，并赋予 id = 'station_original_map'
         */
        $topGroup.node().appendChild(
          $svg
            .select("g")
            .attr("id", "__layer__station_original_map")
            .node()
        );

        $svg.call(
          d3
            .zoom()
            .scaleExtent([1, 20])
            .on("zoom", function({ transform }) {
              $topGroup.attr("transform", transform);
            })
        );

        return $topGroup;
      }

      /**
       * 生成随机字符串
       */
      function generateUID() {
        return Math.random()
          .toString(32)
          .slice(2, -1);
      }

      /**
       * 加载危险区域测试数据
       * @param {url} url - 测试数据地址
       */
      function getDangerousZoneData(url) {
        return new Promise((resolve) => {
          fetch(url)
            .then((res) => res.json())
            .then(resolve);
        });
      }
    </script>
  </body>
</html>
