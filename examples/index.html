<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>列车接近预警系统 Web 端各功能独立演示页面</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background-color: #669ecc;
        color: #fff;
        background-attachment: fixed;
        background-position: center;
        background-size: cover;
      }
      main {
        max-width: 1280px;
        margin: 50px auto 100px;
        padding: 0 20px;
      }
      .page-list {
        max-width: 100%;
        -moz-column-count: 4;
        column-count: 4;
        -moz-column-gap: 20px;
        column-gap: 20px;
        margin-top: 60px;
      }
      .page-list a.card {
        break-inside: avoid;
        box-sizing: border-box;
        display: block;
        text-decoration: none;
        transition: all 270ms;
        margin-bottom: 20px;
        cursor: default;
        overflow: hidden;
      }
      .page-list a.card[href] {
        cursor: pointer;
      }
      .page-list img {
        max-width: 100%;
        display: block;
      }
      .page-list h2 {
        font-weight: normal;
        max-width: 100%;
        line-height: 1;
        margin: 0;
        padding: 10px 0;
        font-size: 18px;
        color: #fff;
        text-align: center;
        text-shadow: 1px 1px 2px #205c8e;
      }
      .page-list p {
        max-width: 100%;
        line-height: 1.5;
        margin: 0 0 10px;
        font-size: 14px;
        color: #777;
      }
      h1 {
        text-align: center;
        margin: 20px 0;
        line-height: 1;
        letter-spacing: 0.1em;
        font-size: 2em;
        text-shadow: 2px 3px 6px rgb(64 114 155);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>列车接近预警系统网页端 各功能独立演示</h1>
      <h1></h1>
      <div class="page-list">
        <a
          class="card"
          target="_blank"
          href="./examples/track-turnount-light-signal/index.html"
        >
          <img src="./examples/track-turnount-light-signal/demo.gif" alt="" />
          <h2>轨道+道岔+信号机</h2>
        </a>
        <a
          class="card"
          target="_blank"
          href="./examples/dangerous-zone/index.html"
        >
          <img src="./examples/dangerous-zone/demo.gif" alt="" />
          <h2>危险区域</h2>
        </a>
        <a
          class="card"
          target="_blank"
          href="./examples/working-area/index.html"
        >
          <img src="./examples/working-area/demo.gif" alt="" />
          <h2>工作区域</h2>
        </a>
        <a class="card">
          <img src="./examples/static/building.jpg" alt="" />
          <h2>机车导航</h2>
        </a>
        <a class="card">
          <img src="./examples/static/building.jpg" alt="" />
          <h2>肩章手台</h2>
        </a>
        <a class="card">
          <img src="./examples/static/building.jpg" alt="" />
          <h2>机头</h2>
        </a>
        <a class="card">
          <img src="./examples/static/building.jpg" alt="" />
          <h2>机具</h2>
        </a>
        <a class="card">
          <img src="./examples/static/building.jpg" alt="" />
          <h2>气象</h2>
        </a>
      </div>
    </main>
  </body>
</html>
